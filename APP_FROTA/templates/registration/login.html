{% extends 'base.html' %}

{% block title %}Login - Gestão de Frota{% endblock %}

{% block content %}
<div style="max-width: 450px; margin: 2rem auto; position: relative; overflow: hidden;" class="card">
    <!-- Gradient accent line at the top -->
    <div
        style="position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #00c6ff 0%, #0072ff 100%);">
    </div>

    <h2
        style="text-align: center; margin-bottom: 2rem; font-size: 2rem; background: linear-gradient(to right, #ffffff, #64ffda); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
        Login no Sistema</h2>

    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="id_username">Usuário</label>
            {{ form.username }}
        </div>
        <div class="form-group">
            <label for="id_password">Senha</label>
            {{ form.password }}
        </div>
        <button type="submit" class="btn"
            style="width: 100%; margin-top: 1.5rem; padding: 14px; font-size: 1.1rem; letter-spacing: 1px;">Entrar</button>
        <input type="hidden" name="next" value="{{ next }}">
    </form>
</div>
{% endblock %}
