{% extends 'base.html' %}

{% block title %}Logout - Gestão de Frota{% endblock %}

{% block content %}
<div class="card"
    style="text-align: center; max-width: 500px; margin: 3rem auto; position: relative; overflow: hidden;">
    <!-- Gradient accent line at the top -->
    <div
        style="position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #00c6ff 0%, #0072ff 100%);">
    </div>

    <h2
        style="margin-bottom: 1.5rem; background: linear-gradient(to right, #ffffff, #64ffda); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
        Você saiu com sucesso.</h2>
    <p style="font-size: 1.1rem;">Obrigado por utilizar o sistema de Gestão de Frota.</p>

    <a href="{% url 'APP_FROTA:login' %}" class="btn" style="margin-top: 2rem; padding: 12px 30px;">Fazer login
        novamente</a>
</div>
{% endblock %}
