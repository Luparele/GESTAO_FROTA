{% extends 'base.html' %}

{% block title %}Novo Condutor - Sistema de Frota{% endblock %}

{% block content %}
<div class="card" style="margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center;">
    <h2 style="margin: 0;">Novo Condutor</h2>
    <a href="{% url 'APP_FROTA:condutor_list' %}" class="btn"
        style="background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2);">Cancelar</a>
</div>

<div class="card" style="max-width: 800px; margin: 0 auto; padding: 2.5rem;">
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem;">
            {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                <div style="color: #ff5252; font-size: 0.85rem; margin-top: 0.5rem;">
                    {{ field.errors.0 }}
                </div>
                {% endif %}
            </div>
            {% endfor %}
        </div>

        <div
            style="margin-top: 2.5rem; text-align: right; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 2rem;">
            <button type="submit" class="btn" style="padding: 1rem 3rem; font-size: 1.1rem; font-weight: 600;">Finalizar
                Cadastro</button>
        </div>
    </form>
</div>
{% endblock %}
